<!DOCTYPE html>
<html>
<head>
<title>My To Do List</title>

<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding-top:50px;
}

h1{
font-size:40px;
}

input{
padding:10px;
width:200px;
border:none;
border-radius:5px;
}

button{
padding:10px;
border:none;
background:#ff9800;
color:white;
border-radius:5px;
cursor:pointer;
}

ul{
margin-top:20px;
}

li{
list-style:none;
background:white;
color:black;
padding:10px;
margin:10px auto;
width:250px;
border-radius:5px;
}

.delete{
background:red;
color:white;
margin-left:10px;
padding:5px;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>My To-Do List</h1>

<input type="text" id="task" placeholder="Enter a task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask(){

let taskInput=document.getElementById("task");
let taskValue=taskInput.value;

if(taskValue===""){
alert("Please enter a task");
return;
}

let li=document.createElement("li");
li.innerText=taskValue;

let del=document.createElement("button");
del.innerText="Delete";
del.className="delete";

del.onclick=function(){
li.remove();
}

li.appendChild(del);

document.getElementById("list").appendChild(li);

taskInput.value="";
}
</script>

</body>
</html>
